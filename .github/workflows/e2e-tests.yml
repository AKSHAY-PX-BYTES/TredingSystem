name: E2E Tests (Playwright)

# Runs the TradingSystem.E2E Playwright suite ONLY after the frontend has been
# successfully deployed on Render. A gate job polls the Render API for the
# deploy of the pushed commit:
#   - deploy reached "live"  -> run the E2E tests
#   - deploy failed/canceled -> skip the tests (no run)
# Manual dispatch and the daily schedule run against whatever is currently live.

on:
  push:
    branches: [main]
    # Only bother gating/testing when something that affects the deployed
    # frontend (or the tests themselves) actually changed.
    paths:
      - 'src/TradingSystem.Web/**'
      - 'src/TradingSystem.E2E/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend base URL to test against'
        required: false
        default: 'https://tredingsystem-31vm.onrender.com'
  schedule:
    - cron: '30 2 * * *' # 02:30 UTC daily

jobs:
  # ── Gate: only proceed if Render finished deploying this commit successfully ──
  wait-for-render:
    name: Wait for Render deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deploy_ok: ${{ steps.gate.outputs.deploy_ok }}
    steps:
      - name: Check Render deploy status
        id: gate
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # If Render credentials aren't configured, we cannot gate — run tests
          # anyway (preserves previous behavior) but warn loudly.
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_WEB_SERVICE_ID not set — deploy gating is DISABLED. Tests will run against whatever is currently live."
            echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          API="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=20"
          AUTH="Authorization: Bearer ${RENDER_API_KEY}"

          # Terminal deploy states
          is_success() { [ "$1" = "live" ]; }
          is_failure() {
            case "$1" in
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Manual/scheduled runs: no new commit to wait for — just confirm the
          # service's most recent deploy is healthy (live).
          if [ "${EVENT_NAME}" != "push" ]; then
            echo "Event '${EVENT_NAME}': checking the latest Render deploy is live..."
            for i in $(seq 1 60); do
              resp=$(curl -fsS -H "${AUTH}" "${API}" || echo "")
              status=$(echo "${resp}" | jq -r '.[0].deploy.status // empty')
              echo "  latest deploy status: ${status:-<none>}"
              if [ -n "${status}" ] && is_success "${status}"; then
                echo "deploy_ok=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              if [ -n "${status}" ] && is_failure "${status}"; then
                echo "::warning::Latest Render deploy is '${status}' — skipping E2E."
                echo "deploy_ok=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              sleep 15
            done
            echo "::warning::Timed out waiting for a live deploy — skipping E2E."
            echo "deploy_ok=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Push: wait for the deploy that matches THIS commit to reach a
          # terminal state, then gate on whether it succeeded.
          echo "Waiting for Render to deploy commit ${COMMIT_SHA}..."
          for i in $(seq 1 100); do   # ~25 min max (100 * 15s)
            resp=$(curl -fsS -H "${AUTH}" "${API}" || echo "")
            status=$(echo "${resp}" | jq -r --arg sha "${COMMIT_SHA}" \
              'map(.deploy) | map(select(.commit.id == $sha)) | .[0].status // empty')

            if [ -z "${status}" ]; then
              echo "  [$i] no deploy for this commit yet..."
            else
              echo "  [$i] deploy status for commit: ${status}"
              if is_success "${status}"; then
                echo "Render deploy succeeded — proceeding with E2E."
                echo "deploy_ok=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              if is_failure "${status}"; then
                echo "::warning::Render deploy '${status}' for this commit — skipping E2E."
                echo "deploy_ok=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
            fi
            sleep 15
          done

          echo "::warning::Timed out waiting for Render to finish deploying this commit — skipping E2E."
          echo "deploy_ok=false" >> "$GITHUB_OUTPUT"

  e2e:
    name: Run Playwright E2E
    needs: wait-for-render
    # Only run the suite when the gate confirmed a successful Render deploy.
    if: ${{ needs.wait-for-render.outputs.deploy_ok == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: src/TradingSystem.E2E

    env:
      BASE_URL: ${{ github.event.inputs.base_url || vars.E2E_BASE_URL || 'https://tredingsystem-31vm.onrender.com' }}
      API_BASE_URL: ${{ vars.E2E_API_BASE_URL || 'https://tredingsystem-api.onrender.com' }}
      TEST_ENV: ${{ vars.E2E_TEST_ENV || 'production' }}
      TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      # Email (optional) — configure as repo secrets to enable notifications
      SMTP_HOST: ${{ secrets.E2E_SMTP_HOST }}
      SMTP_PORT: ${{ secrets.E2E_SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.E2E_SMTP_SECURE }}
      SMTP_USER: ${{ secrets.E2E_SMTP_USER }}
      SMTP_PASS: ${{ secrets.E2E_SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.E2E_EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.E2E_EMAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/TradingSystem.E2E/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (headless)
        run: npm run ci

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-html-report
          path: src/TradingSystem.E2E/reports/html
          retention-days: 30

      - name: Upload traces & screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: src/TradingSystem.E2E/test-results
          retention-days: 14

      - name: Email report
        if: always()
        run: npm run email:report
        continue-on-error: true

      - name: Fail job if any test failed
        if: always()
        run: |
          node -e "const fs=require('fs');const p='reports/results.json';if(!fs.existsSync(p)){console.error('No results.json');process.exit(1);}const r=JSON.parse(fs.readFileSync(p,'utf-8'));const u=(r.stats&&r.stats.unexpected)||0;console.log('Unexpected failures:',u);process.exit(u>0?1:0);"
