name: E2E Tests (Playwright)

# Runs the TradingSystem.E2E Playwright suite headlessly on:
#  - pushes to main/develop
#  - pull requests
#  - deployment events
#  - a daily schedule
#  - manual dispatch
# Then publishes the HTML report as an artifact and emails the results.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend base URL to test against'
        required: false
        default: 'https://tredingsystem-31vm.onrender.com'
  schedule:
    - cron: '30 2 * * *' # 02:30 UTC daily

defaults:
  run:
    working-directory: src/TradingSystem.E2E

jobs:
  e2e:
    name: Run Playwright E2E
    runs-on: ubuntu-latest
    # Skip on deployment events that aren't "success"
    if: ${{ github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success' }}
    timeout-minutes: 45

    env:
      BASE_URL: ${{ github.event.inputs.base_url || vars.E2E_BASE_URL || 'https://tredingsystem-31vm.onrender.com' }}
      API_BASE_URL: ${{ vars.E2E_API_BASE_URL || 'https://tredingsystem-api.onrender.com' }}
      TEST_ENV: ${{ vars.E2E_TEST_ENV || 'production' }}
      TEST_USERNAME: ${{ secrets.E2E_TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      # Email (optional) — configure as repo secrets to enable notifications
      SMTP_HOST: ${{ secrets.E2E_SMTP_HOST }}
      SMTP_PORT: ${{ secrets.E2E_SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.E2E_SMTP_SECURE }}
      SMTP_USER: ${{ secrets.E2E_SMTP_USER }}
      SMTP_PASS: ${{ secrets.E2E_SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.E2E_EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.E2E_EMAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/TradingSystem.E2E/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (headless)
        run: npm run ci

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: src/TradingSystem.E2E/reports/html
          retention-days: 30

      - name: Upload traces & screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: src/TradingSystem.E2E/test-results
          retention-days: 14

      - name: Email report
        if: always()
        run: npm run email:report
        continue-on-error: true

      - name: Fail job if any test failed
        if: always()
        run: |
          node -e "const fs=require('fs');const p='reports/results.json';if(!fs.existsSync(p)){console.error('No results.json');process.exit(1);}const r=JSON.parse(fs.readFileSync(p,'utf-8'));const u=(r.stats&&r.stats.unexpected)||0;console.log('Unexpected failures:',u);process.exit(u>0?1:0);"
