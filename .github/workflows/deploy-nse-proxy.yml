name: Deploy NSE Proxy to Fly.io

# Deploys the TradingSystem.NseProxy to Fly.io from GitHub — no local CLI needed.
# Trigger: manually from the Actions tab, or automatically when proxy files change on main.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/TradingSystem.NseProxy/**"
      - ".github/workflows/deploy-nse-proxy.yml"

jobs:
  deploy:
    name: Deploy proxy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-nse-proxy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it does not exist
        working-directory: src/TradingSystem.NseProxy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl apps create tradingsystem-nse-proxy || true

      - name: Deploy
        working-directory: src/TradingSystem.NseProxy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
