name: Deploy NSE Proxy to Fly.io

# Deploys the TradingSystem.NseProxy to Fly.io from GitHub — no local CLI needed.
# Trigger: manually from the Actions tab, or automatically when proxy files change on main.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/TradingSystem.NseProxy/**"
      - ".github/workflows/deploy-nse-proxy.yml"

jobs:
  deploy:
    name: Deploy proxy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-nse-proxy
      cancel-in-progress: true
    env:
      FLY_APP: tredingsystem-nse-proxy-akshay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if it does not exist
        working-directory: src/TradingSystem.NseProxy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if flyctl status --app "$FLY_APP" >/dev/null 2>&1; then
            echo "App $FLY_APP already exists."
          else
            echo "Creating app $FLY_APP ..."
            flyctl apps create "$FLY_APP"
          fi

      - name: Deploy
        working-directory: src/TradingSystem.NseProxy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app "$FLY_APP"
