# ============================================
# Reads FRONTEND from frontend.config automatically
# Change frontend.config to switch: angular / blazor
# ============================================

[build]
  command = "chmod +x build.sh && ./build.sh"
  publish = "build_output"

[build.environment]
  NODE_VERSION = "20"
  DOTNET_VERSION = "8.0"

[[redirects]]
  from = "/auth/*"
  to = "https://tredingsystem-api.onrender.com/auth/:splat"
  status = 200

[[redirects]]
  from = "/market/*"
  to = "https://tredingsystem-api.onrender.com/market/:splat"
  status = 200

[[redirects]]
  from = "/predict/*"
  to = "https://tredingsystem-api.onrender.com/predict/:splat"
  status = 200

[[redirects]]
  from = "/strategy/*"
  to = "https://tredingsystem-api.onrender.com/strategy/:splat"
  status = 200

[[redirects]]
  from = "/news/*"
  to = "https://tredingsystem-api.onrender.com/news/:splat"
  status = 200

[[redirects]]
  from = "/backtest/*"
  to = "https://tredingsystem-api.onrender.com/backtest/:splat"
  status = 200

[[redirects]]
  from = "/exchange/*"
  to = "https://tredingsystem-api.onrender.com/exchange/:splat"
  status = 200

[[redirects]]
  from = "/currency/*"
  to = "https://tredingsystem-api.onrender.com/currency/:splat"
  status = 200

[[redirects]]
  from = "/subscription/*"
  to = "https://tredingsystem-api.onrender.com/subscription/:splat"
  status = 200

[[redirects]]
  from = "/notifications/*"
  to = "https://tredingsystem-api.onrender.com/notifications/:splat"
  status = 200

[[redirects]]
  from = "/ai/*"
  to = "https://tredingsystem-api.onrender.com/ai/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "https://tredingsystem-api.onrender.com/admin/:splat"
  status = 200

[[redirects]]
  from = "/activity/*"
  to = "https://tredingsystem-api.onrender.com/activity/:splat"
  status = 200

[[redirects]]
  from = "/hubs/*"
  to = "https://tredingsystem-api.onrender.com/hubs/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"
