[build]
  command = "dotnet publish src/TradingSystem.Web/TradingSystem.Web.csproj -c Release -o output"
  publish = "output/wwwroot"

[build.environment]
  DOTNET_VERSION = "8.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
