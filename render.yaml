services:
  - type: web
    name: tradingsystem-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /swagger

  - type: web
    name: trading-system-angular
    env: static
    buildCommand: cd src/TradingSystem.Angular && npm ci && npm run build -- --configuration=production
    staticPublishPath: src/TradingSystem.Angular/dist/trading-system/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tredingsystem-api.onrender.com/api/*
      - type: rewrite
        source: /hubs/*
        destination: https://tredingsystem-api.onrender.com/hubs/*
      - type: rewrite
        source: /*
        destination: /index.html
