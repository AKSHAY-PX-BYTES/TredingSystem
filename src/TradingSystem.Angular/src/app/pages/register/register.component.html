<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-icon">📈</span>
        <h1>Create Account</h1>
        <p class="login-subtitle">Join AI-powered Trading System</p>
      </div>
    </div>
    <div class="login-body">
      <div class="login-error" *ngIf="errorMessage"><span class="error-icon">⚠️</span> {{errorMessage}}</div>
      <div class="pwd-success" *ngIf="successMessage">✅ {{successMessage}}</div>
      <form (ngSubmit)="handleRegister()" class="login-form">
        <div class="form-group">
          <label>👤 Username</label>
          <input [(ngModel)]="model.username" name="username" class="form-input" placeholder="Choose a username" [disabled]="isLoading" />
        </div>
        <div class="form-group">
          <label>✉️ Email</label>
          <input [(ngModel)]="model.email" name="email" type="email" class="form-input" placeholder="Your email address" [disabled]="isLoading" />
        </div>
        <div class="form-group">
          <label>🔒 Password</label>
          <input [(ngModel)]="model.password" name="password" [type]="showPassword ? 'text' : 'password'" class="form-input" placeholder="Create a password" [disabled]="isLoading" />
        </div>
        <div class="form-group">
          <label>🔒 Confirm Password</label>
          <input [(ngModel)]="model.confirmPassword" name="confirmPassword" type="password" class="form-input" placeholder="Confirm password" [disabled]="isLoading" />
        </div>
        <button type="submit" class="login-btn" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          {{isLoading ? 'Creating...' : '🚀 Create Account'}}
        </button>
      </form>
      <div style="text-align: center; margin-top: 1.5rem;">
        <span style="color: var(--text-muted);">Already have an account?</span>
        <a routerLink="/login" style="color: var(--groww-green); font-weight: 600; margin-left: 0.5rem;">Sign In</a>
      </div>
    </div>
  </div>
</div>
