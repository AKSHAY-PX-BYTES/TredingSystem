[build]
  command = "npm ci && npm run build -- --configuration=production"
  publish = "dist/trading-system/browser"

[[redirects]]
  from = "/api/*"
  to = "https://tredingsystem-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/hubs/*"
  to = "https://tredingsystem-api.onrender.com/hubs/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
