# Render deployment config for Angular frontend
# Replace the existing web service in the root render.yaml with this

services:
  - type: web
    name: trading-system-angular
    env: static
    buildCommand: cd src/TradingSystem.Angular && npm ci && npm run build -- --configuration=production
    staticPublishPath: src/TradingSystem.Angular/dist/trading-system-angular/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tredingsystem-api.onrender.com/api/*
      - type: rewrite
        source: /hubs/*
        destination: https://tredingsystem-api.onrender.com/hubs/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
