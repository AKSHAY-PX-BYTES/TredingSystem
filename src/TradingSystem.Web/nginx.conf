events { }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/wasm wasm;
        application/octet-stream dll;
    }

    server {
        listen 10000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback - all routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache framework files
        location /_framework/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Proxy API calls to existing Render API
        location /api/ {
            proxy_pass https://tredingsystem-api.onrender.com/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host tredingsystem-api.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy SignalR hubs
        location /hubs/ {
            proxy_pass https://tredingsystem-api.onrender.com/hubs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host tredingsystem-api.onrender.com;
        }
    }
}
