events { }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 10000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html =404;
            # Ensure html is served correctly
            location ~* \.html$ {
                add_header Content-Type text/html;
            }
        }

        location /_framework/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            # Serve .wasm files with correct type
            location ~* \.wasm$ {
                types { application/wasm wasm; }
            }
            # Serve .dll as octet-stream
            location ~* \.dll$ {
                types { application/octet-stream dll; }
            }
        }

        location /api/ {
            proxy_pass https://tredingsystem-api.onrender.com/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host tredingsystem-api.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /hubs/ {
            proxy_pass https://tredingsystem-api.onrender.com/hubs/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host tredingsystem-api.onrender.com;
        }
    }
}
